name: CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

  release-targets:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            build_tool: cargo-zigbuild
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            build_tool: cargo-zigbuild
          - os: macos-14
            target: aarch64-apple-darwin
            build_tool: cargo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig
        if: ${{ matrix.build_tool == 'cargo-zigbuild' }}
        uses: mlugg/setup-zig@v2

      - name: Install cargo-zigbuild
        if: ${{ matrix.build_tool == 'cargo-zigbuild' }}
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Build release target
        env:
          BUILD_TOOL: ${{ matrix.build_tool }}
          TOOLBOX_VERSION: ci
        run: |
          if [[ "${BUILD_TOOL}" == "cargo-zigbuild" ]]; then
            cargo zigbuild --release --target ${{ matrix.target }} --bin toolbox
          else
            cargo build --release --target ${{ matrix.target }} --bin toolbox
          fi
