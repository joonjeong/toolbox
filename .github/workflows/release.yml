name: Release

on:
  workflow_call:
    inputs:
      target_ref:
        description: "Git ref or SHA to build and attach to the release."
        required: true
        type: string
      head:
        description: "LINE HeadVer head value."
        required: false
        default: "0"
        type: string
      build:
        description: "LINE HeadVer build value."
        required: true
        type: string
      timezone:
        description: "Timezone used for LINE HeadVer yearweek."
        required: false
        default: "Asia/Seoul"
        type: string

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      asset_suffix: ${{ steps.metadata.outputs.asset_suffix }}
      release_name: ${{ steps.metadata.outputs.release_name }}
      release_notes: ${{ steps.metadata.outputs.release_notes }}
      release_tag: ${{ steps.metadata.outputs.release_tag }}
      release_version: ${{ steps.metadata.outputs.version }}
      target_sha: ${{ steps.metadata.outputs.target_sha }}
    steps:
      - name: Checkout target
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_ref }}

      - name: Resolve release metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail
          scripts/release-metadata \
            --target-ref "${{ inputs.target_ref }}" \
            --head "${{ inputs.head }}" \
            --build "${{ inputs.build }}" \
            --timezone "${{ inputs.timezone }}" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NAME: ${{ steps.metadata.outputs.release_name }}
          RELEASE_NOTES: ${{ steps.metadata.outputs.release_notes }}
          RELEASE_TAG: ${{ steps.metadata.outputs.release_tag }}
          TARGET_REF: ${{ steps.metadata.outputs.target_sha }}
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} already exists; assets will be uploaded."
            exit 0
          fi

          gh release create "${RELEASE_TAG}" \
            --target "${TARGET_REF}" \
            --title "${RELEASE_NAME}" \
            --notes "${RELEASE_NOTES}"

  build:
    name: Build ${{ matrix.asset }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: toolbox-x86_64-unknown-linux-gnu
            apt_packages: ""
            linker: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset: toolbox-aarch64-unknown-linux-gnu
            apt_packages: gcc-aarch64-linux-gnu
            linker: aarch64-linux-gnu-gcc
          - os: macos-14
            target: aarch64-apple-darwin
            asset: toolbox-aarch64-apple-darwin
            apt_packages: ""
            linker: ""
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.target_sha }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux cross linker
        if: ${{ matrix.apt_packages != '' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt_packages }}

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
          TOOLBOX_VERSION: ${{ needs.prepare.outputs.release_version }}
        run: cargo build --release --target ${{ matrix.target }} --bin toolbox

      - name: Package
        shell: bash
        env:
          ASSET_NAME: ${{ matrix.asset }}-${{ needs.prepare.outputs.asset_suffix }}
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/toolbox" "dist/${ASSET_NAME}"
          chmod +x "dist/${ASSET_NAME}"
          shasum -a 256 "dist/${ASSET_NAME}" > "dist/${ASSET_NAME}.sha256"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: gh release upload "${RELEASE_TAG}" dist/* --clobber
