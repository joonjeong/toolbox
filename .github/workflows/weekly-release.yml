name: Weekly Release

on:
  schedule:
    # 10:00 KST every Sunday.
    - cron: "0 1 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare headver release
    runs-on: ubuntu-latest
    outputs:
      asset_suffix: ${{ steps.headver.outputs.asset_suffix }}
      release_tag: ${{ steps.headver.outputs.release_tag }}
      release_version: ${{ steps.headver.outputs.release_version }}
      should_release: ${{ steps.headver.outputs.should_release }}
      target_sha: ${{ steps.headver.outputs.target_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate headver
        id: headver
        env:
          GH_TOKEN: ${{ github.token }}
          HEADVER_MAJOR: "0"
        shell: bash
        run: |
          set -euo pipefail

          target_sha="$(git rev-parse HEAD)"
          commit_count="$(git rev-list --count HEAD)"
          release_version="${HEADVER_MAJOR}.${commit_count}.0"
          release_tag="v${release_version}"
          asset_suffix="${release_tag#v}"

          {
            echo "target_sha=${target_sha}"
            echo "release_version=${release_version}"
            echo "release_tag=${release_tag}"
            echo "asset_suffix=${asset_suffix}"
          } >> "${GITHUB_OUTPUT}"

          if gh release view "${release_tag}" >/dev/null 2>&1; then
            echo "should_release=false" >> "${GITHUB_OUTPUT}"
            echo "Release ${release_tag} already exists; skipping."
            exit 0
          fi

          echo "should_release=true" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub release
        if: steps.headver.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.headver.outputs.release_tag }}
          RELEASE_VERSION: ${{ steps.headver.outputs.release_version }}
          TARGET_SHA: ${{ steps.headver.outputs.target_sha }}
        run: |
          gh release create "${RELEASE_TAG}" \
            --target "${TARGET_SHA}" \
            --title "toolbox ${RELEASE_TAG}" \
            --notes "Automated weekly headver release ${RELEASE_VERSION} for ${TARGET_SHA}."

  build:
    name: Build ${{ matrix.asset }}
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: toolbox-linux-x86_64
          - os: macos-13
            target: x86_64-apple-darwin
            asset: toolbox-macos-x86_64
          - os: macos-14
            target: aarch64-apple-darwin
            asset: toolbox-macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.target_sha }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bin toolbox

      - name: Package
        shell: bash
        env:
          ASSET_NAME: ${{ matrix.asset }}-${{ needs.prepare.outputs.asset_suffix }}
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/toolbox" "dist/${ASSET_NAME}"
          chmod +x "dist/${ASSET_NAME}"
          shasum -a 256 "dist/${ASSET_NAME}" > "dist/${ASSET_NAME}.sha256"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: gh release upload "${RELEASE_TAG}" dist/* --clobber
